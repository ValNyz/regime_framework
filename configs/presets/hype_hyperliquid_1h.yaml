# Preset: HYPE/USDC perp on Hyperliquid, 1h. ~12k bars since Dec 2024.

target: HYPE
venue: hyperliquid
quote: USDC
settle: USDC
timeframe: 1h

data_root: ~/regime_data
# cross defaults to BTC for HYPE target

label:
  method: trend_scan
  L_range: [72, 120, 168, 240, 336, 480, 720]
  t_threshold: 0.0

features:
  use_technical: true
  use_external: true
  use_trading_signals: false

split:
  train_fraction: 0.80

predictors:
  families: [classical, rule_based, deep_nets, transformer, pretrained]
  pretrained_models:
    - chronos_bolt_base
    - chronos_large
    - timesfm
    - moirai_large
    - moirai_moe
    - timemoe
    - lag_llama
    - toto
  pretrained_modes: [zero_shot, fine_tuned]
  fine_tune_head: logreg
  forecast_horizon: 24

seed: 42
