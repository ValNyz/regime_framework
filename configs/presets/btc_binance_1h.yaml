# Preset: BTC/USDT perp on Binance, 1h. Largest dataset (~58k bars, 6+ years).
#
# Paths are auto-resolved from data_root using the canonical layout:
#   {data_root}/binance/futures/BTC_USDT_USDT-1h-futures.feather
#   {data_root}/binance/futures/BTC_USDT_USDT-1h-funding_rate.feather
#   {data_root}/binance/futures/ETH_USDT_USDT-1h-futures.feather   (cross-asset)
#   {data_root}/external/                                           (FNG, ETF, DXY, VIX)

target: BTC
venue: binance
quote: USDT
settle: USDT
timeframe: 1h

# Single root containing all data — override per machine.
data_root: ~/regime_data

# Optional cross-asset override (default auto-resolves to ETH for BTC target)
# cross:
#   target: SOL

label:
  method: trend_scan
  L_range: [72, 120, 168, 240, 336, 480, 720, 1080]
  t_threshold: 0.0

features:
  use_technical: true
  use_external: true
  use_trading_signals: false

split:
  train_fraction: 0.80

predictors:
  families: [classical, rule_based, deep_nets, transformer, pretrained]
  pretrained_models:
    - chronos_bolt_base
    - chronos_large
    - timesfm
    - moirai_large
    - moirai_moe
    - timemoe
    - lag_llama
    - toto
  pretrained_modes: [zero_shot, fine_tuned]
  fine_tune_head: logreg
  forecast_horizon: 24

seed: 42
