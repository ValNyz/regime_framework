# Preset: BTC/USDT perp on Binance, 1h. Largest dataset (~58k bars, 6+ years).
#
# Inherits everything from configs/default.yaml. Only overrides what differs.

target: BTC
venue: binance
quote: USDT
settle: USDT
timeframe: 1h

features:
  use_trading_signals: false
  # Path is resolved relative to the framework's configs/ dir if not absolute.
  # Default: bundled battery (vwap_zscore + RSI + BB + climax + trend_weakening)
  # trading_signals_yaml: trading_signals_battery.yaml
  trading_signals_yaml: /home/portainer/workspace/crypto_comparative_analysis/configs/signals_p1p2_grid.yaml

label:
  method: trend_scan
  L_range: [72, 120, 168, 240, 336, 480, 720, 1080]
  t_threshold: 0.0
  hysteresis_bars: 168 # 1 semaine au 1h — réduit le bruit (191 flips → 50 sur BTC 6 ans dans tes runs précédents)
  strong_threshold: 2.0

# label:
#   method: trend_scan
#   L_range: [72, 120, 168, 240, 336, 480, 720, 1080]
#   t_threshold: 0.0
#   hysteresis_bars: 0
#   strong_threshold: 2.0

# label:
#   method: triple_barrier
#   horizon: 720 # 30 jours en 1h
#   tp_mult: 2.0 # take-profit barrier à +2σ
#   sl_mult: 2.0 # stop-loss barrier à -2σ (symétrique)
#   vol_lookback: 168 # σ estimée sur 1 semaine
#   timeout_label: sign # canonical : signe du return à l'expiration

# Asymétrique — stop-loss serré (bias bear)
# label:
#   method: triple_barrier
#   horizon: 720
#   tp_mult: 2.0
#   sl_mult: 1.0           # SL plus serré que TP
#   vol_lookback: 168
#   timeout_label: sign

# Horizon court — labels plus réactifs, plus de timeouts résolus par signe
# label:
#   method: triple_barrier
#   horizon: 168 # 1 semaine au lieu de 30 jours
#   tp_mult: 1.5 # barrières plus serrées car horizon plus court
#   sl_mult: 1.5
#   vol_lookback: 168
#   timeout_label: sign

# Mode strict — drop les timeouts (pour debug : voir combien sont vraiment résolus par barrière)
# label:
#   method: triple_barrier
#   horizon: 720
#   tp_mult: 2.0
#   sl_mult: 2.0
#   vol_lookback: 168
#   timeout_label: drop    # au lieu de sign

split:
  cv_mode: rolling
  train_window_bars: 17520
  test_window_bars: 2190

plots:
  enabled: true
  per_fold: true

predictors:
  families: [classical]
  feature_importance: false
  include_finetune: true
  ensemble_groups:
    - name: trees
      bases: [RandomForest, ExtraTrees]
    - name: lr_trees
      bases: [LogReg, RandomForest, ExtraTrees]
  disabled: [LightGBM, LightGBM-FT, MLP, MLP-FT, XGBoost, XGBoost-FT]

