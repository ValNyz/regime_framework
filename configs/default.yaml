# Default config — copied as fallback when a preset doesn't override a field.
# Useful as a single-source-of-truth reference of all available knobs.

target: BTC
venue: binance
timeframe: 1h

paths:
  ohlcv: /tmp/missing.feather
  funding: null
  cross_ohlcv: null
  cross_name: cross
  external_dir: null

label:
  method: trend_scan        # trend_scan | triple_barrier | drawdown
  L_range: [72, 120, 168, 240, 336, 480, 720, 1080]
  t_threshold: 0.0
  horizon: 48               # used by triple_barrier
  alpha: 1.5                # used by triple_barrier

features:
  use_technical: true
  use_external: true
  use_trading_signals: false
  trading_signals_yaml: null
  drop_nan_rows: true

split:
  train_fraction: 0.80
  purge_bars: null          # null → max(L_range)

predictors:
  families: [classical, rule_based, deep_nets, transformer, pretrained]
  pretrained_models:
    - chronos_bolt_base
    - chronos_large
    - timesfm
    - moirai_large
    - moirai_moe
    - timemoe
    - lag_llama
    - toto
  pretrained_modes: [zero_shot, fine_tuned]
  fine_tune_head: logreg    # logreg | mlp
  forecast_horizon: 24

seed: 42
