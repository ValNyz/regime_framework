# Default config — merged under every preset. Presets only need to override
# what differs (typically: target, venue, quote, settle, timeframe, data_root).
#
# Use `regime-run presets` to list available presets.

# --- Asset / venue / TF (must be overridden by preset) ---
target: BTC
venue: binance
quote: USDT
settle: USDT
timeframe: 1h

# --- Where data lives (must be overridden by preset or per machine) ---
data_root: ~/workspace/hyperliquid_data/user_data/data

# Cross-asset side-channel features (opt-in, 0..N coins).
# Accepts a dict (single coin) or a list of dicts (multi-coin).
# Each entry inherits quote/settle/market_type/venue from root unless overridden.
# Each entry produces ~13 features prefixed by `<target>_` (lowercase).
#
# Single coin (this preset):
cross:
  target: ETH
#
# Multi-coin example:
# cross:
#   - target: ETH
#   - target: SOL
#   - target: BNB
#     market_type: spot      # can mix futures target + spot cross
#     quote: USDT

# --- Labelling ---
label:
  method: trend_scan # trend_scan | triple_barrier | drawdown
  L_range: [72, 120, 168, 240, 336, 480, 720, 1080]
  t_threshold: 0.0

  # Temporal hysteresis: 0 = no hysteresis (raw bar-by-bar trend-scan, noisy).
  # >0 = require N consecutive bars of strong opposite t-stat to switch regime.
  # 168 (7 days at 1h) eliminates intra-trend pullback flips on BTC.
  hysteresis_bars: 168
  strong_threshold: 2.0
  horizon: 48 # used by triple_barrier only
  alpha: 1.5 # used by triple_barrier only

# --- Features ---
features:
  use_technical: true
  use_external: true
  use_trading_signals: true
  # Path is resolved relative to the framework's configs/ dir if not absolute.
  # Default: bundled battery (vwap_zscore + RSI + BB + climax + trend_weakening)
  trading_signals_yaml: trading_signals_battery.yaml
  drop_nan_rows: true

# --- Train/test split ---
split:
  train_fraction: 0.80
  purge_bars: null # null → max(L_range)

# --- Predictors ---
predictors:
  families: [classical, rule_based, deep_nets, transformer, pretrained]
  pretrained_models:
    - chronos_bolt_base
    - chronos_large
    - timesfm
    - moirai_large
    - moirai_moe
    - timemoe
    - lag_llama
    # toto disabled by default — Datadog's checkpoint requires their custom
    # loader (no model_type in config.json, AutoModel raises). Add it back
    # once you've installed their proprietary inference library.
    # - toto
  pretrained_modes: [zero_shot, fine_tuned]
  fine_tune_head: logreg # logreg | mlp
  forecast_horizon: 24

# --- Multi-coin training (optional) ---
# When extra_coins is non-empty, the training data for ML predictors is
# augmented with these coins (each computed independently). The target coin
# alone is used for testing. A coin_id one-hot feature is added so the
# classifier can learn coin-specific biases.
training:
  extra_coins:
    [{ target: ETH }, { target: SOL }, { target: BNB }, { target: XRP }]
  add_coin_id_feature: true

seed: 42
